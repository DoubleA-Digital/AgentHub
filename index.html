<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Hub 🤖</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg1: #f0e7ff;
    --bg2: #e0f0ff;
    --bg3: #fce4ec;
    --card: rgba(255,255,255,0.82);
    --card-border: rgba(255,255,255,0.95);
    --shadow: 0 8px 32px rgba(120,80,200,0.10);
    --shadow-lg: 0 16px 48px rgba(120,80,200,0.16);
    --radius: 22px;
    --radius-sm: 14px;
    --font: 'Nunito', sans-serif;
    --text: #2d1f5e;
    --text2: #6b5b9b;
    --text3: #a99dc5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    min-height: 100vh;
    background: linear-gradient(135deg, #f0e7ff 0%, #dceeff 35%, #e8f8f0 65%, #fff0f5 100%);
    background-attachment: fixed;
    color: var(--text);
    overflow-x: hidden;
  }

  /* Decorative blobs */
  body::before {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(168,130,255,0.18) 0%, transparent 70%);
    top: -200px; left: -100px;
    pointer-events: none; z-index: 0;
    border-radius: 50%;
  }
  body::after {
    content: '';
    position: fixed;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(100,200,255,0.15) 0%, transparent 70%);
    bottom: -150px; right: -100px;
    pointer-events: none; z-index: 0;
    border-radius: 50%;
  }

  /* ── NAV ── */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(20px);
    border-bottom: 2px solid rgba(168,130,255,0.15);
    padding: 0 28px;
    height: 62px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .nav-logo {
    display: flex; align-items: center; gap: 10px;
    font-size: 20px; font-weight: 900;
    background: linear-gradient(135deg, #7c3aed, #db2777);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .nav-logo span { font-size: 26px; }

  .nav-links { display: flex; gap: 8px; }

  .nav-link {
    padding: 8px 20px; border-radius: 50px;
    font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    text-decoration: none; color: var(--text2);
    border: 2px solid transparent;
  }

  .nav-link:hover { background: rgba(124,58,237,0.08); color: #7c3aed; border-color: rgba(124,58,237,0.2); }
  .nav-link.active { background: linear-gradient(135deg, #7c3aed, #db2777); color: white !important; -webkit-text-fill-color: white !important; }

  .nav-right { display: flex; align-items: center; gap: 14px; }

  .live-badge {
    display: flex; align-items: center; gap: 6px;
    background: rgba(16,185,129,0.12); border: 2px solid rgba(16,185,129,0.3);
    padding: 5px 14px; border-radius: 50px;
    font-size: 12px; font-weight: 800; color: #059669;
  }

  .live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #10b981; animation: pulse 1.5s infinite;
  }

  .clock-display {
    font-size: 13px; font-weight: 700; color: var(--text2);
    background: rgba(255,255,255,0.6); padding: 5px 14px;
    border-radius: 50px; border: 2px solid rgba(168,130,255,0.2);
  }

  /* ── STATS BAR ── */
  .stats-bar {
    position: relative; z-index: 1;
    display: flex; gap: 14px; padding: 18px 28px 0;
  }

  .stat-card {
    flex: 1; background: var(--card);
    backdrop-filter: blur(12px);
    border: 2px solid var(--card-border);
    border-radius: var(--radius-sm);
    padding: 14px 18px;
    box-shadow: var(--shadow);
    display: flex; align-items: center; gap: 12px;
  }

  .stat-icon {
    width: 42px; height: 42px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }

  .stat-value { font-size: 22px; font-weight: 900; }
  .stat-label { font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: 0.5px; text-transform: uppercase; }

  /* ── MAIN LAYOUT ── */
  .layout {
    position: relative; z-index: 1;
    display: grid;
    grid-template-columns: 270px 1fr 260px;
    gap: 16px;
    padding: 16px 28px 28px;
    height: calc(100vh - 62px - 88px);
    overflow: hidden;
  }

  /* ── PANEL BASE ── */
  .panel {
    background: var(--card);
    backdrop-filter: blur(12px);
    border: 2px solid var(--card-border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  .panel-head {
    padding: 16px 18px 12px;
    border-bottom: 2px solid rgba(168,130,255,0.1);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }

  .panel-title {
    font-size: 13px; font-weight: 800; color: var(--text2);
    text-transform: uppercase; letter-spacing: 1px;
    display: flex; align-items: center; gap: 6px;
  }

  .panel-badge {
    font-size: 11px; font-weight: 800; padding: 3px 10px;
    border-radius: 50px;
    background: linear-gradient(135deg, #7c3aed22, #db277722);
    color: #7c3aed; border: 2px solid rgba(124,58,237,0.15);
  }

  .panel-scroll {
    flex: 1; overflow-y: auto; padding: 12px;
    scrollbar-width: thin; scrollbar-color: rgba(168,130,255,0.3) transparent;
  }

  /* ── AGENT CARDS ── */
  .agent-card {
    background: white; border-radius: var(--radius-sm);
    padding: 12px 14px; margin-bottom: 8px;
    border: 2px solid rgba(255,255,255,0.9);
    box-shadow: 0 4px 16px rgba(120,80,200,0.07);
    cursor: pointer; transition: all 0.22s;
    border-left: 4px solid var(--agent-color, #7c3aed);
    position: relative; overflow: hidden;
  }

  .agent-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--agent-color, #7c3aed)0a, transparent 50%);
    opacity: 0; transition: opacity 0.2s;
  }

  .agent-card:hover { transform: translateY(-2px) scale(1.01); box-shadow: 0 8px 28px rgba(120,80,200,0.15); }
  .agent-card:hover::before { opacity: 1; }

  .agent-row1 { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }

  .agent-avatar {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--agent-color, #7c3aed)22, var(--agent-color, #7c3aed)11);
    border: 2px solid var(--agent-color, #7c3aed)33;
  }

  .agent-info { flex: 1; min-width: 0; }
  .agent-name { font-size: 13px; font-weight: 800; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .agent-role { font-size: 10px; font-weight: 600; color: var(--text3); }

  .status-pill {
    font-size: 9px; font-weight: 800; padding: 3px 8px;
    border-radius: 50px; text-transform: uppercase; letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .status-active { background: #d1fae5; color: #059669; border: 1.5px solid #a7f3d0; }
  .status-idle { background: #f1f5f9; color: #94a3b8; border: 1.5px solid #e2e8f0; }
  .status-working { background: #fef3c7; color: #d97706; border: 1.5px solid #fde68a; animation: blink 1.2s infinite; }

  .agent-task-text {
    font-size: 10px; font-weight: 600; color: var(--text2);
    background: rgba(124,58,237,0.05); border-radius: 8px;
    padding: 4px 8px; line-height: 1.4;
  }

  /* ── ACTIVITY FEED ── */
  .feed-wrap { flex: 1; overflow-y: auto; padding: 14px 16px; scrollbar-width: thin; scrollbar-color: rgba(168,130,255,0.3) transparent; }

  .feed-bubble {
    display: flex; gap: 10px; margin-bottom: 14px;
    animation: slideUp 0.35s ease forwards;
    opacity: 0;
  }

  .bubble-avatar {
    width: 34px; height: 34px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
    border: 2px solid var(--agent-color, #7c3aed)33;
    background: linear-gradient(135deg, var(--agent-color, #7c3aed)22, var(--agent-color, #7c3aed)0a);
  }

  .bubble-body { flex: 1; }

  .bubble-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
  }

  .bubble-name { font-size: 12px; font-weight: 800; color: var(--agent-color, #7c3aed); }
  .bubble-time { font-size: 10px; font-weight: 600; color: var(--text3); }

  .bubble-level {
    font-size: 9px; font-weight: 800; padding: 1px 7px;
    border-radius: 50px; text-transform: uppercase;
  }

  .level-ok { background: #d1fae5; color: #059669; }
  .level-info { background: #dbeafe; color: #2563eb; }
  .level-warn { background: #fef3c7; color: #d97706; }
  .level-idea { background: #ede9fe; color: #7c3aed; }

  .bubble-msg {
    background: white; border-radius: 0 14px 14px 14px;
    padding: 9px 13px; font-size: 12px; font-weight: 600;
    color: var(--text); line-height: 1.5;
    border: 2px solid rgba(168,130,255,0.1);
    box-shadow: 0 2px 10px rgba(120,80,200,0.06);
    border-left: 3px solid var(--agent-color, #7c3aed);
  }

  /* ── INTEGRATIONS ── */
  .integration-card {
    background: white; border-radius: var(--radius-sm);
    padding: 11px 14px; margin-bottom: 8px;
    border: 2px solid rgba(16,185,129,0.15);
    display: flex; align-items: center; gap: 11px;
    box-shadow: 0 3px 12px rgba(16,185,129,0.07);
  }

  .integration-icon-wrap {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }

  .integration-details { flex: 1; }
  .integration-name { font-size: 12px; font-weight: 800; color: var(--text); }
  .integration-status { font-size: 10px; font-weight: 700; color: #059669; display: flex; align-items: center; gap: 4px; margin-top: 1px; }
  .int-dot { width: 6px; height: 6px; border-radius: 50%; background: #10b981; animation: pulse 2s infinite; }

  .int-check {
    width: 26px; height: 26px; border-radius: 50%;
    background: linear-gradient(135deg, #10b981, #059669);
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 13px; font-weight: 900;
    box-shadow: 0 4px 10px rgba(16,185,129,0.3);
    flex-shrink: 0;
  }

  /* Vault entries */
  .vault-card {
    background: white; border-radius: var(--radius-sm);
    padding: 10px 13px; margin-bottom: 7px;
    border: 2px solid rgba(124,58,237,0.1);
    box-shadow: 0 2px 10px rgba(120,80,200,0.05);
  }

  .vault-title { font-size: 11px; font-weight: 800; color: #7c3aed; margin-bottom: 3px; }
  .vault-body { font-size: 10px; font-weight: 600; color: var(--text2); line-height: 1.4; }
  .vault-meta { font-size: 9px; font-weight: 700; color: var(--text3); margin-top: 4px; }

  /* ── ANIMATIONS ── */
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.7} }
  @keyframes slideUp {
    from { opacity:0; transform: translateY(12px); }
    to { opacity:1; transform: translateY(0); }
  }
  @keyframes float {
    0%,100%{ transform: translateY(0); }
    50%{ transform: translateY(-6px); }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(168,130,255,0.3); border-radius: 5px; }

  /* ── MODAL ── */
  .modal-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(44,20,80,0.35); backdrop-filter: blur(6px);
    z-index: 500; align-items: center; justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal-box {
    background: white; border-radius: var(--radius);
    padding: 28px; max-width: 500px; width: 92%;
    box-shadow: var(--shadow-lg); animation: slideUp 0.25s forwards;
    max-height: 85vh; overflow-y: auto;
  }
  .modal-close {
    float: right; background: #f1f5f9; border: none;
    width: 30px; height: 30px; border-radius: 8px;
    cursor: pointer; font-size: 16px; color: var(--text2);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font); font-weight: 800;
    transition: background 0.2s;
  }
  .modal-close:hover { background: #fee2e2; color: #ef4444; }

  .modal-agent-head { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
  .modal-avatar { width: 54px; height: 54px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
  .modal-name { font-size: 20px; font-weight: 900; }
  .modal-role { font-size: 12px; font-weight: 700; color: var(--text3); }
  .modal-desc { font-size: 13px; font-weight: 600; color: var(--text2); line-height: 1.7; margin-bottom: 16px; }
  .modal-section-title { font-size: 10px; font-weight: 800; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .skills-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
  .skill-chip {
    font-size: 11px; font-weight: 700; padding: 4px 12px;
    border-radius: 50px; background: rgba(124,58,237,0.08);
    color: #7c3aed; border: 1.5px solid rgba(124,58,237,0.15);
  }
</style>
</head>

  architect:['Breaking project into subtasks and assigning to agents','Reviewing API contract for payment endpoint','Planning DB schema for orders table','Evaluating performance budget across all modules'],
  'frontend-lead':['Implementing GSAP scroll animation for hero section','Optimizing Three.js render loop → targeting 60fps','Building responsive checkout card component','Writing GLSL shader for background effect'],
  'frontend-support':['Optimizing hero image → reducing to 180kb','Fixing cross-browser flexbox issue on Safari','Adding Framer Motion enter animation to nav','Running Lighthouse audit — score: 94'],
  backend:['Building Supabase Edge Function for Clover charge','Setting up PostgreSQL orders schema','Implementing JWT auth middleware','Testing charge-order endpoint with sandbox token'],
  email:['Designing MJML order confirmation template','Configuring SendGrid domain authentication','Setting up transactional email flow for orders','Testing deliverability — SPF/DKIM verified'],
  devops:['Auto-committing stable frontend changes','Opening PR: feat/clover-payment-integration','Running GitHub Actions CI pipeline','Deploying preview branch to Vercel'],
  tester:['Running Playwright E2E suite — 47 tests passed ✅','Detected visual regression in checkout modal','Running Lighthouse performance audit','API integration test — all endpoints healthy'],
  reviewer:['ESLint scan complete — 0 errors, 3 warnings','Security audit: no critical vulnerabilities','Flagging unused dependency in package.json','OWASP check — SQL injection patterns scanned'],
  fixer:['Resolved memory leak in event listener cleanup','Fixed null check on user session object','Hot-fix applied to checkout error handler','Performance fix: API 340ms → 80ms ⚡'],
  innovator:['Research: competitors missing loyalty programs 💡','Idea: AR menu preview using WebXR — saving to vault','Market analysis: catering peaks Fri–Sun','New idea: SMS notifications via Twilio'],
};

let feedCount = 0, taskCount = 0, currentTab = 'pending';

const TASKS = {
  pending: [],
  progress: [],
  done: []
};

// ── RENDER AGENTS ──
function renderAgents() {
  const list = document.getElementById('agentList');
  const statuses = {};
  AGENTS.forEach(a => statuses[a.id] = a.status);

  list.innerHTML = AGENTS.map(a => {
    const msgs = MSGS[a.id];
    const task = a.status !== 'idle' ? msgs[Math.floor(Math.random() * Math.min(msgs.length, 3))] : 'Awaiting task…';
    const sc = a.status === 'active' ? 'status-active' : a.status === 'working' ? 'status-working' : 'status-idle';
    return `<div class="agent-card" style="--agent-color:${a.color}" onclick="openModal('${a.id}')">
      <div class="agent-row1">
        <div class="agent-avatar" style="--agent-color:${a.color}">${a.icon}</div>
        <div class="agent-info">
          <div class="agent-name">${a.name}</div>
          <div class="agent-role">${a.role}</div>
        </div>
        <div class="status-pill ${sc}">${a.status}</div>
      </div>
      <div class="agent-task-text">${task}</div>
    </div>`;
  }).join('');

  const active = AGENTS.filter(a => a.status === 'active' || a.status === 'working').length;
  document.getElementById('agent-count').textContent = `${active} Active`;
  document.getElementById('stat-active').textContent = active;
}

// ── RENDER INTEGRATIONS ──
function renderIntegrations() {
  document.getElementById('integrationsList').innerHTML = INTEGRATIONS.map(i => `
  <div class="integration-card">
    <div class="integration-icon-wrap" style="background:${i.bg}">${i.icon}</div>
    <div class="integration-details">
      <div class="integration-name">${i.name}</div>
      <div class="integration-status"><div class="int-dot"></div> Connected</div>
    </div>
    <div class="int-check">✓</div>
  </div>`).join('');
}

// ── RENDER VAULT ──
function renderVault() {
  document.getElementById('vaultList').innerHTML = VAULT.map(v => `
  <div class="vault-card">
    <div class="vault-title">${v.title}</div>
    <div class="vault-body">${v.body}</div>
    <div class="vault-meta">${v.meta}</div>
  </div>`).join('');
}

// ── FEED ──
function addMsg(agentId, msg, level = 'info', time = null) {
  const a = AGENTS.find(x => x.id === agentId);
  if (!a) return;
  const feed = document.getElementById('feed');
  const now = time || new Date().toTimeString().slice(0,5);
  const levelLabels = { ok:'✅ ok', info:'ℹ️ info', warn:'⚠️ warn', idea:'💡 idea' };

  const el = document.createElement('div');
  el.className = 'feed-bubble';
  el.style.setProperty('--agent-color', a.color);
  el.innerHTML = `
    <div class="bubble-avatar" style="--agent-color:${a.color}">${a.icon}</div>
    <div class="bubble-body">
      <div class="bubble-header">
        <span class="bubble-name" style="color:${a.color}">${a.name}</span>
        <span class="bubble-time">${now}</span>
        <span class="bubble-level level-${level}">${levelLabels[level]||level}</span>
      </div>
      <div class="bubble-msg" style="border-left-color:${a.color}">${msg}</div>
    </div>`;
  feed.appendChild(el);
  feed.scrollTop = feed.scrollHeight;
  while (feed.children.length > 100) feed.removeChild(feed.firstChild);

  feedCount++;
  document.getElementById('feedBadge').textContent = `${feedCount} messages`;
  document.getElementById('stat-msgs').textContent = feedCount;
}

// ── LOG TO SUPABASE (real activity) ──────────────────────────
async function logActivity(agentId, agentName, message, level = 'info') {
  try {
    await fetch('/api/activity', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ agent_id: agentId, agent_name: agentName, message, level })
    });
  } catch {}
}

// ── LOAD REAL ACTIVITY FROM SUPABASE ─────────────────────────
async function loadRealActivity() {
  try {
    const res = await fetch('/api/activity');
    const rows = await res.json();
    if (Array.isArray(rows) && rows.length > 0) {
      // Show oldest first
      rows.reverse().forEach(r => addMsg(r.agent_id, r.message, r.level, new Date(r.created_at).toTimeString().slice(0,5)));
    }
  } catch {}
}

// ── SUBSCRIBE TO REALTIME NEW ENTRIES ────────────────────────
function subscribeRealtime() {
  _sb.channel('agent-activity')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'agent_activity' }, payload => {
      const r = payload.new;
      addMsg(r.agent_id, r.message, r.level, new Date(r.created_at).toTimeString().slice(0,5));
    })
    .subscribe();
}

// ── LOAD REAL TASKS FROM SUPABASE ────────────────────────────
async function loadRealTasks() {
  try {
    const res = await fetch('/api/tasks');
    const rows = await res.json();
    if (Array.isArray(rows) && rows.length > 0) {
      TASKS.pending = rows.filter(r => r.status === 'pending').map(r => ({ name: r.title, agent: r.agent_name, id: r.id }));
      TASKS.progress = rows.filter(r => r.status === 'progress').map(r => ({ name: r.title, agent: r.agent_name, id: r.id }));
      TASKS.done = rows.filter(r => r.status === 'done').map(r => ({ name: r.title, agent: r.agent_name, id: r.id }));
      const doneCount = TASKS.done.length;
      document.getElementById('stat-tasks').textContent = doneCount;
      taskCount = doneCount;
      renderTasks(currentTab);
    }
  } catch {}
}

function startFeed() {
  // First load real data from Supabase
  loadRealActivity();
  subscribeRealtime();
  loadRealTasks();

  // Then continue simulating + logging to Supabase so the feed stays live
  const active = AGENTS.filter(a => a.status !== 'idle');

  function tick() {
    const a = active[Math.floor(Math.random() * active.length)];
    const msg = MSGS[a.id][Math.floor(Math.random() * MSGS[a.id].length)];
    const lv = a.id === 'innovator' ? 'idea' : a.id === 'tester' && Math.random() > 0.6 ? 'warn' : Math.random() > 0.7 ? 'ok' : 'info';
    // Log to Supabase — this triggers realtime in ALL connected browsers
    logActivity(a.id, a.name, msg, lv);
    setTimeout(tick, 8000 + Math.random() * 7000);
  }
  setTimeout(tick, 3000);
}

// ── MODAL ──
function openModal(id) {
  const a = AGENTS.find(x => x.id === id);
  if (!a) return;
  const sc = a.status === 'active' ? 'status-active' : a.status === 'working' ? 'status-working' : 'status-idle';
  document.getElementById('modalBox').innerHTML = `
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-agent-head">
      <div class="modal-avatar" style="background:${a.color}22;border:3px solid ${a.color}33;border-radius:16px">${a.icon}</div>
      <div>
        <div class="modal-name">${a.name}</div>
        <div class="modal-role">${a.role} · <span class="status-pill ${sc}" style="font-size:10px">${a.status}</span></div>
      </div>
    </div>
    <div class="modal-desc">${a.desc}</div>
    <div class="modal-section-title">Skills</div>
    <div class="skills-wrap">${a.skills.map(s => `<span class="skill-chip" style="background:${a.color}12;color:${a.color};border-color:${a.color}25">${s}</span>`).join('')}</div>
    <div style="margin-top:16px">
      <div class="modal-section-title">Recent Messages</div>
      ${MSGS[id].slice(0,3).map(m => `<div style="font-size:12px;font-weight:600;color:#6b5b9b;padding:6px 0;border-bottom:1.5px solid #f0e7ff">› ${m}</div>`).join('')}
    </div>`;
  document.getElementById('modalBg').classList.add('open');
}

function closeModal() { document.getElementById('modalBg').classList.remove('open'); }
function maybeClose(e) { if (e.target === document.getElementById('modalBg')) closeModal(); }

// ── TASKS ──
function renderTasks(tab) {
  currentTab = tab;
  const items = TASKS[tab] || [];
  document.getElementById('taskCount') && (document.getElementById('taskCount').textContent = items.length);
}

// ── CLOCK ──
setInterval(() => {
  document.getElementById('clock').textContent = new Date().toTimeString().slice(0,8);
}, 1000);

// ── INIT ──
renderAgents();
renderIntegrations();
renderVault();
startFeed();
</script>
</body>
</html>
