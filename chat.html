<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat with the Team 💬</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --font: 'Nunito', sans-serif;
    --text: #f0f0f0;
    --text2: #cc0000;
    --text3: #888;
    --card: rgba(18,18,18,0.95);
    --shadow: 0 8px 32px rgba(0,0,0,0.5);
    --radius: 22px;
    --radius-sm: 14px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: var(--font);
    min-height: 100vh;
    background: #0a0a0a;
    background-attachment: fixed;
    color: var(--text);
    display: flex; flex-direction: column;
  }

  body::before {
    content:''; position:fixed;
    width:500px; height:500px; border-radius:50%;
    background: radial-gradient(circle, rgba(220,0,0,0.08) 0%, transparent 70%);
    top:-150px; right:-100px; pointer-events:none; z-index:0;
  }

  /* NAV */
  nav {
    position:sticky; top:0; z-index:100;
    background: rgba(10,10,10,0.9); backdrop-filter: blur(20px);
    border-bottom: 2px solid rgba(200,0,0,0.2);
    padding: 0 28px; height:62px;
    display:flex; align-items:center; justify-content:space-between;
  }

  .nav-logo {
    display:flex; align-items:center; gap:10px;
    font-size:20px; font-weight:900;
    background: linear-gradient(135deg,#ff2020,#cc0000);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .nav-logo span { font-size:26px; }

  .nav-links { display:flex; gap:8px; }
  .nav-link {
    padding:8px 20px; border-radius:50px;
    font-size:14px; font-weight:700; cursor:pointer;
    transition:all 0.2s; text-decoration:none; color:#888;
    border:2px solid transparent; font-family:var(--font);
  }
  .nav-link:hover { background:rgba(200,0,0,0.1); color:#ff3333; border-color:rgba(200,0,0,0.2); }
  .nav-link.active { background:linear-gradient(135deg,#cc0000,#ff2020); color:white !important; -webkit-text-fill-color:white !important; }

  /* MAIN */
  main {
    position:relative; z-index:1; flex:1;
    display:grid; grid-template-columns:240px 1fr;
    gap:16px; padding:20px 28px 28px;
    height: calc(100vh - 62px); overflow:hidden;
  }

  /* SIDEBAR */
  .sidebar {
    background:#111; backdrop-filter:blur(12px);
    border:1px solid rgba(200,0,0,0.2);
    border-radius:var(--radius); box-shadow:var(--shadow);
    display:flex; flex-direction:column; overflow:hidden;
    height:100%; min-height:0;
  }

  .sidebar-head {
    padding:16px 16px 12px;
    border-bottom:1px solid rgba(200,0,0,0.15);
    font-size:12px; font-weight:800; color:#cc0000;
    text-transform:uppercase; letter-spacing:1px;
  }

  .sidebar-agents { flex:1; overflow-y:auto; padding:10px; scrollbar-width:thin; scrollbar-color:rgba(200,0,0,0.3) transparent; }

  .side-agent {
    display:flex; align-items:center; gap:10px;
    padding:9px 10px; border-radius:var(--radius-sm);
    margin-bottom:6px; cursor:pointer; transition:all 0.2s;
    border:1px solid transparent;
  }
  .side-agent:hover { background:rgba(200,0,0,0.08); border-color:rgba(200,0,0,0.2); }
  .side-agent.selected { background:rgba(200,0,0,0.1); border-color:rgba(200,0,0,0.25); }

  .side-avatar {
    width:32px; height:32px; border-radius:9px;
    display:flex; align-items:center; justify-content:center;
    font-size:15px; flex-shrink:0;
    background:rgba(200,0,0,0.1);
    border:1px solid rgba(200,0,0,0.2);
  }

  .side-name { font-size:12px; font-weight:800; color:#e0e0e0; flex:1; }
  .side-role { font-size:10px; font-weight:600; color:#666; }

  .side-dot {
    width:8px; height:8px; border-radius:50%; flex-shrink:0;
  }
  .dot-active { background:#10b981; box-shadow:0 0 6px rgba(16,185,129,0.5); animation:pulse 2s infinite; }
  .dot-idle { background:#333; }
  .dot-working { background:#f59e0b; box-shadow:0 0 6px rgba(245,158,11,0.5); animation:pulse 1s infinite; }

  /* CHAT AREA */
  .chat-area {
    background:#111; backdrop-filter:blur(12px);
    border:1px solid rgba(200,0,0,0.2);
    border-radius:var(--radius); box-shadow:var(--shadow);
    display:flex; flex-direction:column; overflow:hidden;
    min-height:0; height:100%;
  }

  .chat-header {
    padding:16px 20px;
    border-bottom:1px solid rgba(200,0,0,0.15);
    display:flex; align-items:center; gap:12px;
    background:#0d0d0d;
  }

  .agent-chat-header {
    display: flex; align-items: center; gap: 12px;
  }
  .agent-chat-avatar {
    width: 44px; height: 44px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }

  .chat-bot-avatar {
    width:44px; height:44px; border-radius:14px;
    background:linear-gradient(135deg,#cc0000,#ff2020);
    display:flex; align-items:center; justify-content:center;
    font-size:22px; color:white; flex-shrink:0;
    box-shadow:0 6px 20px rgba(200,0,0,0.4);
  }

  .chat-bot-info { flex:1; }
  .chat-bot-name { font-size:16px; font-weight:900; color:#f0f0f0; }
  .chat-bot-status { font-size:11px; font-weight:700; color:#10b981; display:flex; align-items:center; gap:5px; }
  .chat-bot-status-dot { width:6px; height:6px; border-radius:50%; background:#10b981; animation:pulse 2s infinite; }

  .quick-chips {
    display:flex; gap:8px; flex-wrap:wrap; padding:12px 20px;
    border-bottom:1px solid rgba(200,0,0,0.1);
    background:#0d0d0d;
  }

  .chip {
    font-size:11px; font-weight:700; padding:6px 14px;
    border-radius:50px; cursor:pointer; transition:all 0.2s;
    background:rgba(200,0,0,0.1); color:#cc0000;
    border:1px solid rgba(200,0,0,0.25); font-family:var(--font);
  }
  .chip:hover { background:linear-gradient(135deg,#cc0000,#ff2020); color:white; border-color:transparent; transform:translateY(-1px); }

  /* MESSAGES */
  .messages { flex:1; overflow-y:auto; padding:18px 20px; scrollbar-width:thin; scrollbar-color:rgba(200,0,0,0.3) transparent; min-height:0; background:#111; }

  .msg { display:flex; gap:10px; margin-bottom:16px; animation:slideUp 0.3s forwards; opacity:0; }
  .msg.user-msg { flex-direction:row-reverse; }

  .msg-avatar {
    width:34px; height:34px; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:16px; flex-shrink:0;
  }
  .bot-avatar-sm { background:rgba(200,0,0,0.1); border:1px solid rgba(200,0,0,0.25); }
  .user-avatar-sm { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); }

  .msg-body { max-width:72%; }
  .user-msg .msg-body { align-items:flex-end; }

  .msg-sender { font-size:11px; font-weight:800; color:#cc0000; margin-bottom:4px; }
  .user-msg .msg-sender { text-align:right; color:#888; }

  .msg-bubble {
    padding:11px 15px; border-radius:4px 16px 16px 16px;
    font-size:13px; font-weight:600; line-height:1.6; color:#e0e0e0;
    background:#1a1a1a; border:1px solid rgba(200,0,0,0.15);
    box-shadow:0 2px 12px rgba(0,0,0,0.3);
    border-left:3px solid #cc0000;
  }
  .user-msg .msg-bubble {
    border-radius:16px 4px 16px 16px;
    background:linear-gradient(135deg,#aa0000,#cc0000); color:white;
    border:none; border-right:3px solid rgba(255,255,255,0.15);
    border-left:none;
    box-shadow:0 6px 20px rgba(200,0,0,0.3);
  }

  .msg-time { font-size:10px; font-weight:600; color:#555; margin-top:3px; }
  .user-msg .msg-time { text-align:right; }

  /* Typing indicator */
  .typing {
    display:flex; gap:10px; margin-bottom:16px;
    animation:slideUp 0.3s forwards;
  }
  .typing-dots {
    background:#1a1a1a; border:1px solid rgba(200,0,0,0.15);
    border-left:3px solid #cc0000;
    padding:12px 18px; border-radius:4px 16px 16px 16px;
    display:flex; gap:5px; align-items:center;
    box-shadow:0 2px 12px rgba(0,0,0,0.3);
  }
  .typing-dot { width:7px; height:7px; border-radius:50%; background:#cc0000; animation:typingBounce 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay:0.2s; }
  .typing-dot:nth-child(3) { animation-delay:0.4s; }

  /* INPUT */
  .input-area {
    padding:14px 20px;
    border-top:1px solid rgba(200,0,0,0.15);
    display:flex; gap:10px; align-items:center;
    background:#0d0d0d;
  }

  .chat-input {
    flex:1; padding:12px 18px; border-radius:50px;
    border:1px solid rgba(200,0,0,0.2); font-family:var(--font);
    font-size:13px; font-weight:600; color:#e0e0e0;
    background:#1a1a1a; outline:none; transition:all 0.2s;
  }
  .chat-input:focus { border-color:rgba(200,0,0,0.5); box-shadow:0 0 0 3px rgba(200,0,0,0.1); }
  .chat-input::placeholder { color:#555; }

  .send-btn {
    width:46px; height:46px; border-radius:50%;
    background:linear-gradient(135deg,#aa0000,#cc0000); border:none;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:20px; transition:all 0.2s;
    box-shadow:0 6px 20px rgba(200,0,0,0.4); flex-shrink:0; color:white;
  }
  .send-btn:hover { transform:scale(1.08); box-shadow:0 8px 28px rgba(200,0,0,0.5); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  @keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  @keyframes typingBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-thumb { background:rgba(200,0,0,0.3); border-radius:5px; }

/* TOOL STEPS */
.tool-steps { margin-bottom: 8px; }
.tool-step {
  display: flex; align-items: flex-start; gap: 10px;
  background: #0d0d0d; border: 1px solid rgba(200,0,0,0.2);
  border-radius: 10px; padding: 10px 13px; margin-bottom: 6px;
  font-size: 12px; animation: slideUp 0.25s forwards; opacity: 0;
}
.tool-step.ok { border-left: 3px solid #10b981; }
.tool-step.err { border-left: 3px solid #ef4444; }
.tool-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.tool-body { flex: 1; min-width: 0; }
.tool-name { font-size: 11px; font-weight: 800; color: #cc0000; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
.tool-result {
  font-size: 11px; font-weight: 600; color: #999; line-height: 1.5;
  white-space: pre-wrap; word-break: break-word;
  max-height: 120px; overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: rgba(200,0,0,0.3) transparent;
}
.tool-status { font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 50px; margin-left: auto; flex-shrink: 0; }
.tool-status.ok { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
.tool-status.err { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
</style>
</head>
<body>

<nav>
  <div class="nav-logo"><span>🤖</span> Agent Hub</div>
  <div class="nav-links">
    <a class="nav-link" href="index.html">🏠 Dashboard</a>
    <a class="nav-link active" href="chat.html">💬 Chat with Team</a>
  </div>
</nav>

<main>
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-head">🤖 Team Online</div>
    <div style="padding:8px 10px 4px">
      <div class="side-agent selected" id="agent-btn-team" onclick="selectAgent('team')" style="background:rgba(200,0,0,0.12);border-color:rgba(200,0,0,0.35)">
        <div class="side-avatar" style="background:rgba(200,0,0,0.15);border:2px solid rgba(200,0,0,0.4)">🤖</div>
        <div style="flex:1;min-width:0">
          <div class="side-name">Whole Team</div>
          <div class="side-role">All 10 agents</div>
        </div>
        <div class="side-dot dot-active"></div>
      </div>
    </div>
    <div style="padding:0 10px 4px;font-size:9px;font-weight:800;color:#444;text-transform:uppercase;letter-spacing:1px">Individual Agents</div>
    <div class="sidebar-agents" id="sidebarAgents"></div>
  </div>

  <!-- CHAT -->
  <div class="chat-area">
    <div class="chat-header">
      <div class="agent-chat-header" id="chatHeader">
        <div class="agent-chat-avatar" style="background:linear-gradient(135deg,#cc0000,#ff2020);box-shadow:0 6px 20px rgba(200,0,0,0.4)">🤖</div>
        <div class="chat-bot-info">
          <div class="chat-bot-name">Agent Team Assistant</div>
          <div class="chat-bot-status"><div class="chat-bot-status-dot"></div> All 10 agents connected</div>
        </div>
      </div>
    </div>

    <!-- Quick chips -->
    <div class="quick-chips" id="quickChips"></div>

    <div class="messages" id="messages"></div>

    <div style="text-align:right;padding:4px 20px 0">
      <button onclick="clearChat()" style="background:none;border:none;color:#b0a0cc;font-size:12px;cursor:pointer;opacity:0.7">🗑 Clear chat</button>
    </div>

    <div class="input-area">
      <input class="chat-input" id="chatInput" placeholder="Ask the team anything… e.g. 'Who is building the payment flow?'" onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="send-btn" onclick="sendMsg()">↑</button>
    </div>
  </div>
</main>

<script>
const AGENTS = [
  { id:'architect',       icon:'🧠', name:'Architect',        role:'The Brain',            color:'#7c3aed', status:'active' },
  { id:'frontend-lead',   icon:'🎨', name:'Frontend Lead',    role:'Visual & Interactive', color:'#db2777', status:'active' },
  { id:'frontend-support',icon:'🖌️', name:'Frontend Support', role:'UI & Assets',          color:'#9333ea', status:'idle'   },
  { id:'backend',         icon:'⚙️', name:'Backend Agent',    role:'APIs & Databases',     color:'#d97706', status:'active' },
  { id:'email',           icon:'📧', name:'Email & Comms',    role:'All Notifications',    color:'#dc2626', status:'idle'   },
  { id:'devops',          icon:'🚀', name:'GitHub DevOps',    role:'Deploy & Version Control', color:'#059669', status:'idle' },
  { id:'tester',          icon:'🧪', name:'Tester Agent',     role:'Continuous Testing',   color:'#2563eb', status:'active' },
  { id:'reviewer',        icon:'🔍', name:'Reviewer',         role:'Code Quality',         color:'#ea580c', status:'active' },
  { id:'fixer',           icon:'🔧', name:'Fixer Agent',      role:'Bug Resolution',       color:'#e11d48', status:'working'},
  { id:'innovator',       icon:'💡', name:'Innovator',        role:'Research & Ideas',     color:'#7c3aed', status:'active' },
];

let activeAgent = 'team'; // 'team' or agent id
let chatHistories = { team: [] }; // per-agent histories
AGENTS.forEach(a => chatHistories[a.id] = []);

function toolIcon(name) {
  const icons = { git_status:'🔍', git_push:'🚀', run_command:'⚡', list_files:'📂', read_file:'📄', write_file:'✏️', edit_file:'🔧', deploy:'🌐', create_project:'✨' };
  return icons[name] || '🔧';
}

function formatResponse(text) {
  return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
}

// ── SELECT AGENT ──────────────────────────────────────────────
function selectAgent(id) {
  activeAgent = id;

  // Update sidebar selection
  document.querySelectorAll('.side-agent').forEach(el => el.classList.remove('selected'));
  const btn = document.getElementById(`agent-btn-${id}`);
  if (btn) btn.classList.add('selected');

  // Update chat header
  updateChatHeader();

  // Update quick chips
  updateChips();

  // Restore this agent's chat history
  restoreChatMessages();
}

function updateChatHeader() {
  const header = document.getElementById('chatHeader');
  if (activeAgent === 'team') {
    header.innerHTML = `
      <div class="agent-chat-avatar" style="background:linear-gradient(135deg,#cc0000,#ff2020);box-shadow:0 6px 20px rgba(200,0,0,0.4)">🤖</div>
      <div class="chat-bot-info">
        <div class="chat-bot-name">Agent Team Assistant</div>
        <div class="chat-bot-status"><div class="chat-bot-status-dot"></div> All 10 agents connected</div>
      </div>`;
  } else {
    const a = AGENTS.find(x => x.id === activeAgent);
    if (!a) return;
    header.innerHTML = `
      <div class="agent-chat-avatar" style="background:${a.color}22;border:2px solid ${a.color}55;font-size:22px">${a.icon}</div>
      <div class="chat-bot-info" style="flex:1">
        <div class="chat-bot-name" style="color:${a.color}">${a.name}</div>
        <div class="chat-bot-status" style="color:${a.color}99"><div class="chat-bot-status-dot" style="background:${a.color}"></div> ${a.role} · Direct channel open</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <div style="font-size:10px;font-weight:700;color:#444;background:#1a1a1a;padding:4px 10px;border-radius:50px;border:1px solid #2a2a2a" title="This agent remembers past conversations">🧠 Memory on</div>
        <button onclick="clearAgentMemory('${a.id}')" style="font-size:10px;font-weight:700;color:#666;background:#1a1a1a;border:1px solid #2a2a2a;padding:4px 10px;border-radius:50px;cursor:pointer;font-family:var(--font)" title="Wipe this agent's memory">🗑 Clear memory</button>
      </div>`;
  }
}

const AGENT_CHIPS = {
  team: [
    { label:'🔍 Git status', msg:'Check git status of SowmithCuts' },
    { label:'🚀 Push to GitHub', msg:'Push SowmithCuts to GitHub with message: latest updates' },
    { label:'📄 Read file', msg:'Read the index.html of SowmithCuts' },
    { label:'✨ New project', msg:'Create a new project called TestApp' },
    { label:'📂 List files', msg:'List files in BiryaniTemptations' },
    { label:'🤖 Agent status', msg:'What are all agents currently doing?' },
  ],
  architect: [
    { label:'🧠 Plan SowmithCuts', msg:'Review SowmithCuts and give me a full improvement plan' },
    { label:'🧠 Plan BiryaniTemptations', msg:'Review BiryaniTemptations and give me a full improvement plan' },
    { label:'📋 List all projects', msg:'List all my projects and summarize what each one needs' },
  ],
  'frontend-lead': [
    { label:'🎨 Improve hero', msg:'Read SowmithCuts index.html and improve the hero section' },
    { label:'📱 Check mobile', msg:'Read SowmithCuts index.html and check the mobile responsiveness' },
    { label:'✨ Add animation', msg:'Add a smooth fade-in animation to the menu items on BiryaniTemptations' },
  ],
  'frontend-support': [
    { label:'🖌️ Fix CSS', msg:'Check SowmithCuts for any CSS issues or improvements' },
    { label:'♿ Accessibility', msg:'Audit SowmithCuts for accessibility issues' },
  ],
  backend: [
    { label:'⚙️ Check server', msg:'Read the AgentHub server.js and check for any issues' },
    { label:'🗄️ Check APIs', msg:'List the API endpoints in AgentHub server.js' },
  ],
  devops: [
    { label:'🔍 Status check', msg:'Check git status of SowmithCuts' },
    { label:'🚀 Push SowmithCuts', msg:'Show git status of SowmithCuts then push to GitHub' },
    { label:'🚀 Push BiryaniTemptations', msg:'Show git status of BiryaniTemptations then push to GitHub' },
  ],
  tester: [
    { label:'🧪 Test SowmithCuts', msg:'Run a full audit of SowmithCuts and find all bugs' },
    { label:'🧪 Test BiryaniTemptations', msg:'Run a full audit of BiryaniTemptations and find all bugs' },
    { label:'🧪 Test AgentHub', msg:'Audit the AgentHub project for bugs and issues' },
  ],
  reviewer: [
    { label:'🔍 Security review', msg:'Do a security audit of SowmithCuts' },
    { label:'🔍 Review BiryaniTemptations', msg:'Do a code quality and security review of BiryaniTemptations' },
  ],
  fixer: [
    { label:'🔧 Fix SowmithCuts', msg:'Read SowmithCuts index.html and fix any bugs you find' },
    { label:'🔧 Fix BiryaniTemptations', msg:'Read BiryaniTemptations index.html and fix any bugs you find' },
  ],
  innovator: [
    { label:'💡 Ideas for SowmithCuts', msg:'Analyze SowmithCuts and give me your top 5 improvement ideas' },
    { label:'💡 Ideas for BiryaniTemptations', msg:'Analyze BiryaniTemptations and give me your top revenue ideas' },
    { label:'💡 New project idea', msg:'What kind of new project should I build next?' },
  ],
  email: [
    { label:'📧 Check forms', msg:'Read SowmithCuts and check the contact/booking form handling' },
  ],
};

function updateChips() {
  const chips = AGENT_CHIPS[activeAgent] || AGENT_CHIPS.team;
  document.getElementById('quickChips').innerHTML = chips.map(c =>
    `<button class="chip" onclick="quickSend('${c.msg.replace(/'/g,"\\'")}'">${c.label}</button>`
  ).join('');
}

// ── MESSAGES ──────────────────────────────────────────────────
function addMsg(text, isUser = false, time = null, steps = [], agentId = null) {
  const msgs = document.getElementById('messages');
  const now = time || new Date().toTimeString().slice(0,5);
  const el = document.createElement('div');
  el.className = `msg${isUser ? ' user-msg' : ''}`;

  if (isUser) {
    el.innerHTML = `
      <div class="msg-avatar user-avatar-sm">🧑</div>
      <div class="msg-body">
        <div class="msg-sender">You</div>
        <div class="msg-bubble">${text}</div>
        <div class="msg-time">${now}</div>
      </div>`;
  } else {
    const agent = agentId && agentId !== 'team' ? AGENTS.find(a => a.id === agentId) : null;
    const avatarStyle = agent ? `background:${agent.color}22;border:1px solid ${agent.color}44` : '';
    const avatarIcon = agent ? agent.icon : '🤖';
    const nameColor = agent ? agent.color : '#cc0000';
    const senderName = agent ? agent.name : 'Agent Team';
    const borderColor = agent ? agent.color : '#cc0000';

    const stepsHtml = steps.length ? `<div class="tool-steps">${steps.map(s => {
      const ok = s.ok !== false;
      return `<div class="tool-step ${ok?'ok':'err'}">
        <div class="tool-icon">${toolIcon(s.tool)}</div>
        <div class="tool-body">
          <div class="tool-name">${s.tool.replace(/_/g,' ')}</div>
          <div class="tool-result">${s.result || ''}</div>
        </div>
        <div class="tool-status ${ok?'ok':'err'}">${ok?'✓ done':'✗ error'}</div>
      </div>`;
    }).join('')}</div>` : '';

    el.innerHTML = `
      <div class="msg-avatar bot-avatar-sm" style="${avatarStyle}">${avatarIcon}</div>
      <div class="msg-body">
        <div class="msg-sender" style="color:${nameColor}">${senderName}</div>
        ${stepsHtml}
        <div class="msg-bubble" style="border-left-color:${borderColor}">${formatResponse(text)}</div>
        <div class="msg-time">${now}</div>
      </div>`;
  }
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const agent = activeAgent !== 'team' ? AGENTS.find(a => a.id === activeAgent) : null;
  const el = document.createElement('div');
  el.className = 'typing'; el.id = 'typing';
  const avatarStyle = agent ? `background:${agent.color}22;border:1px solid ${agent.color}44` : '';
  const avatarIcon = agent ? agent.icon : '🤖';
  const borderColor = agent ? agent.color : '#cc0000';
  el.innerHTML = `
    <div class="msg-avatar bot-avatar-sm" style="${avatarStyle}">${avatarIcon}</div>
    <div class="typing-dots" style="border-left-color:${borderColor}">
      <div class="typing-dot" style="background:${agent?.color||'#cc0000'}"></div>
      <div class="typing-dot" style="background:${agent?.color||'#cc0000'}"></div>
      <div class="typing-dot" style="background:${agent?.color||'#cc0000'}"></div>
    </div>`;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function restoreChatMessages() {
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  const history = chatHistories[activeAgent] || [];
  history.forEach(m => addMsg(m.text, m.isUser, m.time, m.steps || [], m.agentId));
  if (history.length === 0) {
    const agent = activeAgent !== 'team' ? AGENTS.find(a => a.id === activeAgent) : null;
    const welcome = agent
      ? `${agent.icon} **${agent.name}** online — direct channel open.\n\nI'm specialized for: ${agent.role}. What do you need?`
      : `Hey there! 👋 I'm the Agent Hub assistant. Ask me anything or click an agent in the sidebar to talk to them directly.`;
    setTimeout(() => addMsg(welcome, false, new Date().toTimeString().slice(0,5), [], activeAgent), 300);
  }
}

// ── SEND MESSAGE ──────────────────────────────────────────────
async function sendMsg() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  addMsg(text, true);
  const history = chatHistories[activeAgent];
  history.push({ text, isUser: true, time: new Date().toTimeString().slice(0,5) });

  showTyping();

  try {
    const endpoint = activeAgent === 'team' ? '/api/chat' : `/api/agent/${activeAgent}`;
    const groqHistory = history.slice(-6).filter(m => m.isUser !== undefined).map(m => ({
      role: m.isUser ? 'user' : 'assistant',
      content: m.text
    }));
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history: groqHistory })
    });
    const data = await res.json();
    removeTyping();
    const reply = data.reply || 'Done.';
    const steps = data.steps || [];
    addMsg(reply, false, null, steps, activeAgent);
    history.push({ text: reply, isUser: false, time: new Date().toTimeString().slice(0,5), steps, agentId: activeAgent });
  } catch {
    removeTyping();
    addMsg('Connection error — make sure the server is running at localhost:3000 🔌', false, null, [], activeAgent);
  }
}

function quickSend(text) {
  document.getElementById('chatInput').value = text;
  sendMsg();
}

function clearChat() {
  chatHistories[activeAgent] = [];
  restoreChatMessages();
}

async function clearAgentMemory(agentId) {
  try {
    await fetch(`/api/agent/${agentId}/memory`, { method: 'DELETE' });
    chatHistories[agentId] = [];
    if (activeAgent === agentId) restoreChatMessages();
    updateChatHeader();
  } catch {}
}

// ── SIDEBAR ───────────────────────────────────────────────────
function renderSidebar() {
  document.getElementById('sidebarAgents').innerHTML = AGENTS.map(a => {
    const dc = a.status === 'active' ? 'dot-active' : a.status === 'working' ? 'dot-working' : 'dot-idle';
    return `<div class="side-agent" id="agent-btn-${a.id}" onclick="selectAgent('${a.id}')">
      <div class="side-avatar" style="background:${a.color}18;border:2px solid ${a.color}30">${a.icon}</div>
      <div style="flex:1;min-width:0">
        <div class="side-name">${a.name}</div>
        <div class="side-role">${a.role}</div>
      </div>
      <div class="side-dot ${dc}"></div>
    </div>`;
  }).join('');
}

// ── INIT ──────────────────────────────────────────────────────
window.addEventListener('load', () => {
  renderSidebar();
  updateChatHeader();
  updateChips();
  restoreChatMessages();
});
</script>
</body>
</html>
